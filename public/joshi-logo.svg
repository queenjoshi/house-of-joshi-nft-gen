<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFC700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:1" />
    </linearGradient>
    <filter id="goldGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
      <feOffset dx="1" dy="1"/>
    </filter>
  </defs>
  
  <!-- J -->
  <path d="M 30 40 L 60 40 Q 65 40 67 45 L 67 110 Q 67 130 50 140 Q 35 150 25 140 L 25 110" 
        fill="url(#goldGradient)" stroke="#8B6914" stroke-width="2" stroke-linejoin="round"/>
  
  <!-- I (vertical) -->
  <rect x="75" y="35" width="15" height="110" fill="url(#goldGradient)" stroke="#8B6914" stroke-width="1.5" rx="2"/>
  
  <!-- J (second letter - stylized) -->
  <path d="M 105 55 Q 120 55 125 65 L 125 120 Q 120 135 105 135 Q 95 135 90 125" 
        fill="url(#goldGradient)" stroke="#8B6914" stroke-width="2" stroke-linejoin="round"/>
</svg>
